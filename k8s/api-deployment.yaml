apiVersion: apps/v1
kind: Deployment
metadata:
  name: fellowship-api
  labels:
    app: fellowship-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fellowship-api
  template:
    metadata:
      labels:
        app: fellowship-api
    spec:
      containers:
      - name: api
        image: engineel/fellowship-api:v1
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: scraper-secrets
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/stats
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /api/stats
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
