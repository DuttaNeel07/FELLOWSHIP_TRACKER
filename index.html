<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fellowship Tracker 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: #000000;
            background-image: radial-gradient(#1a1a1a 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .pb-card {
            background-color: #0d0d0d;
            border: 1px solid #1f2937;
        }

        .pb-green { color: #4ade80; }

        /* Custom scrollbar for terminal feel */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #1f2937; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #4ade80; }
    </style>
</head>
<body class="text-gray-300 min-h-screen selection:bg-green-500/30">

    <div class="max-w-6xl mx-auto py-12 px-4">
        <header class="mb-12">
            <h1 class="text-5xl md:text-7xl font-bold text-white tracking-tighter">
                Fellowship <span class="pb-green">Tracker</span>
            </h1>
        </header>
        <div class="mb-8 flex flex-col md:flex-row gap-4 justify-between items-center">
            <div class="relative w-full md:w-96">
                <input type="text" id="search-input" placeholder="SEARCH_DATABASE..." 
                    class="w-full bg-[#0d0d0d] border border-gray-800 text-white px-4 py-3 rounded-md focus:outline-none focus:border-green-500 font-mono text-sm tracking-wide">
                <div class="absolute right-3 top-3 text-gray-600">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
            </div>
            <div class="text-xs text-gray-500 font-mono">
                LIVE_FEED_STATUS: <span class="text-green-500 animate-pulse">ONLINE</span>
            </div>
        </div>

        <div class="overflow-x-auto pb-card rounded-xl shadow-2xl hidden" id="table-container">
            <table class="w-full min-w-[800px] border-collapse table-fixed">
                <thead>
                    <tr class="bg-[#111] border-b border-gray-800 text-gray-500 text-[10px] uppercase tracking-[0.2em]">
                        <th class="w-[35%] px-6 py-4 text-left font-bold">Opportunity</th>
                        <th class="w-[20%] px-6 py-4 text-center font-bold">Category</th>
                        <th class="w-[15%] px-6 py-4 text-center font-bold">Location</th>
                        <th class="w-[15%] px-6 py-4 text-center font-bold">Deadline</th>
                        <th class="w-[15%] px-6 py-4 text-right font-bold">Link</th>
                    </tr>
                </thead>
                <tbody id="fellowship-list">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = "/api/fellowships";
        let allData = [];

        async function fetchFellowships() {
            const list = document.getElementById('fellowship-list');
            const loading = document.getElementById('loading');
            const container = document.getElementById('table-container');
            const searchInput = document.getElementById('search-input');
    
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                allData = await response.json();
                loading.classList.add('hidden');
                container.classList.remove('hidden');
    
                renderTable(allData);

                // Search Event Listener
                searchInput.addEventListener('input', (e) => {
                    const term = e.target.value.toLowerCase();
                    const filtered = allData.filter(item => 
                        (item.name && item.name.toLowerCase().includes(term)) ||
                        (item.org && item.org.toLowerCase().includes(term)) ||
                        (item.category && item.category.toLowerCase().includes(term)) ||
                        (item.location && item.location.toLowerCase().includes(term))
                    );
                    renderTable(filtered);
                });
    
            } catch (error) {
                console.error("Error fetching data:", error);
                loading.innerHTML = `<span class="text-red-500">[ CONNECTION_ERROR: ${error.message} ]</span>`;
            }
        }

        function renderTable(data) {
            const list = document.getElementById('fellowship-list');
            if (!data || data.length === 0) {
                list.innerHTML = `<tr><td colspan="5" class="text-center py-10 text-gray-500">NO_DATA_MATCH_FOUND</td></tr>`;
                return;
            }

            list.innerHTML = data.map(f => {
                const isPrimeLoc = (f.location && (f.location.includes('Hyderabad') || f.location.includes('Bangalore')));
                const locationClass = isPrimeLoc ? 'text-white font-bold bg-green-900/20 px-2 py-1 rounded' : 'text-gray-500';
                
                // badge colors
                let badgeColor = 'bg-gray-800 text-gray-400';
                if (f.category) {
                    if (f.category.includes('Open Source')) badgeColor = 'bg-orange-900/30 text-orange-400 border border-orange-900/50';
                    else if (f.category.includes('Research')) badgeColor = 'bg-blue-900/30 text-blue-400 border border-blue-900/50';
                    else if (f.category.includes('Corporate')) badgeColor = 'bg-purple-900/30 text-purple-400 border border-purple-900/50';
                }

                return `
                <tr class="hover:bg-[#151515] transition-colors border-b border-gray-900">
                    <td class="px-6 py-4 text-sm font-medium text-white">
                        <div class="truncate"><span class="pb-green mr-2">#</span>${f.name}</div>
                        <div class="text-[10px] text-gray-600 mt-1 uppercase tracking-wider">${f.org || 'Unknown Org'}</div>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <span class="px-2 py-1 rounded text-[10px] uppercase font-bold tracking-wider ${badgeColor}">
                            ${f.category || 'OTHER'}
                        </span>
                    </td>
                     <td class="px-6 py-4 text-center text-xs">
                        <span class="${locationClass}">
                            ${f.location || 'India'}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-center">
                        <span class="inline-block px-3 py-1 text-[10px] font-bold uppercase border ${f.deadline === 'Check Website' ? 'text-gray-500 border-gray-800' : 'pb-green border-green-900/50 bg-green-950/20'} rounded-sm whitespace-nowrap">
                            ${f.deadline || 'CHECK SITE'}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <a href="${f.apply_link}" target="_blank" class="pb-green hover:underline text-xs font-bold tracking-tighter whitespace-nowrap">
                            [ APPLY ]
                        </a>
                    </td>
                </tr>
            `}).join('');
        }
    
        fetchFellowships();
    </script>
</body>
</html>
