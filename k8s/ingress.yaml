apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fellowship-ingress
spec:
  ingressClassName: nginx
  rules:
  - host: fellowship.local
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: fellowship-api
            port:
              number: 80
      - path: /
        pathType: Prefix
        backend:
          service:
            name: fellowship-frontend
            port:
              number: 80